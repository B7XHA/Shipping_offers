<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة العروض والخدمات</title>
    <!-- استدعاء خط Cairo للشياكة -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="content">
        <h1 id="page-title" class="main-title">جاري تحميل الأقسام...</h1>
        
        <div id="main-container">
            <!-- هنا ستظهر الأقسام والعروض تلقائياً -->
        </div>

        <br>
        <a href="index.html" class="back-btn">← العودة للرئيسية</a>
    </div>

    <!-- القائمة السفلية (Bottom Sheet) -->
    <div class="overlay" id="overlay" onclick="closeSheet()"></div>
    <div class="bottom-sheet" id="bottomSheet">
        <div class="sheet-header">
            <h3>اطلب العرض الآن عبر:</h3>
        </div>
        <div class="contact-options">
            <a href="#" id="wa1" class="contact-item">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
                <span>واتساب 1</span>
            </a>
            <a href="#" id="wa2" class="contact-item">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
                <span>واتساب 2</span>
            </a>
            <a href="#" id="tg" class="contact-item">
                <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" alt="Telegram">
                <span>تليجرام</span>
            </a>
        </div>
        <button class="close-btn" onclick="closeSheet()">إلغاء</button>
    </div>

    <script>
        // --- الإعدادات الأساسية ---
        // في كل صفحة غير هذا الاسم (Orange, Vodafone, Etisalat)
        const folderName = 'Orange'; 
        
        const container = document.getElementById('main-container');
        document.getElementById('page-title').innerText = `عروض شركة ${folderName}`;

        async function loadEverything() {
            try {
                // 1. قراءة ملف اقسام.txt لمعرفة المجلدات الفرعية
                const response = await fetch(`${folderName}/اقسام.txt`);
                if (!response.ok) {
                    container.innerHTML = `<p class="error-msg">تأكد من إنشاء ملف "اقسام.txt" داخل مجلد ${folderName}</p>`;
                    return;
                }
                
                const content = await response.text();
                // تنظيف الأسماء من المسافات الزائدة
                const categories = content.split('\n').map(c => c.trim()).filter(c => c.length > 0);

                if (categories.length === 0) {
                    container.innerHTML = "<p>لا توجد أقسام مضافة في ملف اقسام.txt</p>";
                    return;
                }

                // 2. الدخول لكل مجلد قسم وجلب ملفات offer1, offer2...
                for (let cat of categories) {
                    // إنشاء عنوان للقسم
                    const catHeader = document.createElement('h2');
                    catHeader.className = 'category-title';
                    catHeader.innerText = cat;
                    container.appendChild(catHeader);

                    const catDiv = document.createElement('div');
                    catDiv.className = 'category-section';
                    container.appendChild(catDiv);

                    // فحص أول 30 ملف في القسم (ممكن تزود الرقم)
                    for (let i = 1; i <= 30; i++) {
                        try {
                            const resp = await fetch(`${folderName}/${cat}/offer${i}.txt`);
                            if (resp.ok) {
                                const text = await resp.text();
                                renderOffer(text, catDiv);
                            }
                        } catch (e) { continue; }
                    }
                }
            } catch (error) {
                console.error("Error:", error);
                container.innerHTML = "<p>حدث خطأ أثناء تحميل البيانات، تأكد من رفع الملفات بشكل صحيح.</p>";
            }
        }

        function renderOffer(text, parentDiv) {
            const div = document.createElement('div');
            div.className = 'offer-box';
            
            // استخراج رسالة الواتساب من بين ~~
            const match = text.match(/~~(.*?)~~/);
            const orderMsg = match ? match[1] : "طلب خدمة";
            
            // معالجة النصوص (العنوان والحذف)
            let htmlContent = text.replace(/\*\*\*(.*?)\*\*\*/g, '<span class="offer-title">$1</span>')
                                  .replace(/~~(.*?)~~/g, '') // إخفاء كود الرسالة
                                  .replace(/\n/g, '<br>');

            div.innerHTML = htmlContent;
            
            // عند الضغط يفتح القائمة السفلية
            div.onclick = () => openSheet(orderMsg);
            parentDiv.appendChild(div);
        }

        // وظائف القائمة السفلية
        function openSheet(msg) {
            const encodedMsg = encodeURIComponent("سلام عليكم، محتاج: " + msg);
            
            // تحديث الروابط بالأرقام واليوزر اللي طلبتهم
            document.getElementById('wa1').href = `https://wa.me/201070339762?text=${encodedMsg}`;
            document.getElementById('wa2').href = `https://wa.me/201153787930?text=${encodedMsg}`;
            document.getElementById('tg').href = `https://t.me/X_Ha7mo_X?text=${encodedMsg}`;
            
            document.getElementById('bottomSheet').classList.add('active');
            document.getElementById('overlay').style.display = 'block';
        }

        function closeSheet() {
            document.getElementById('bottomSheet').classList.remove('active');
            document.getElementById('overlay').style.display = 'none';
        }

        // بدء التحميل
        loadEverything();
    </script>
</body>
</html>
